name: TaskTracker CI/CD

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Debug Repository
        run: |
          echo "===== Current Directory ====="
          pwd

          echo "===== Files ====="
          ls -la

          echo "===== Git Files ====="
          git ls-files

          echo "===== Python Path ====="
          python -c "import sys; print(sys.path)"

          echo "===== Does main.py exist? ====="
          python -c "from pathlib import Path; print(Path('main.py').exists())"

          echo "===== Try importing main ====="
          python -c "import main"

      - name: Run Ruff Lint
        run: ruff check .

      - name: Run tests with coverage (80% gate)
        run: pytest --cov=. --cov-fail-under=80

      - name: Docker build (CI check)
        run: docker build -t tasktracker-app .

  security_and_push:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tasktracker-app .

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: tasktracker-app
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag image
        run: |
          docker tag tasktracker-app ${{ secrets.DOCKER_USERNAME }}/tasktracker-app:latest

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/tasktracker-app:latest