name: TaskTracker CI/CD

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: chat_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d chat_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:root@localhost:5432/chat_db
      APP_NAME: tasktracker
      LOG_LEVEL: INFO
      DEBUG: "True"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Run Ruff Lint
        run: ruff check .

     - name: Run Tests
  env:
    PYTHONPATH: ${{ github.workspace }}
  run: |
    pwd
    ls -la
    python -c "import sys; print(sys.path)"
    python -c "import main"
    python -m pytest --cov=. --cov-fail-under=80 -v

      - name: Build Docker Image
        run: docker build -t tasktracker-app .

  security_and_push:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t tasktracker-app .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: tasktracker-app
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag tasktracker-app ${{ secrets.DOCKER_USERNAME }}/tasktracker-app:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/tasktracker-app:latest
