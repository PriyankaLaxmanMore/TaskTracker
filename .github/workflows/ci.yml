name: TaskTracker CI/CD

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff httpx

      - name: Run Ruff Lint
        run: ruff check .

      - name: Run Tests with Coverage
        run: pytest --cov=. --cov-fail-under=80

      - name: Build Docker Image
        run: docker build -t tasktracker-app .

  security_and_push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t tasktracker-app .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: tasktracker-app
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag tasktracker-app ${{ secrets.DOCKER_USERNAME }}/tasktracker-app:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/tasktracker-app:latest