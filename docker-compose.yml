version: "3.9"

services:

  db:
    image: postgres:16
    container_name: postgres_db

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: chat_db

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chat_db"]
      interval: 5s
      timeout: 5s
      retries: 10


  app:
    build: .

    container_name: fastapi_app

    restart: unless-stopped

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy

    env_file:
      - .env